name: Dependency Update

on:
  repository_dispatch:
    types: [fzt-updated]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: frontend/go.mod

      - name: Update dependencies
        working-directory: frontend
        run: |
          go get github.com/nelsong6/fzt@latest
          go get github.com/nelsong6/fzt-terminal@latest
          go mod tidy

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet frontend/go.mod frontend/go.sum; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Already on latest"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "go.mod updated:"
            git diff frontend/go.mod
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          FZT_VER=$(grep 'github.com/nelsong6/fzt ' frontend/go.mod | awk '{print $2}')
          TERM_VER=$(grep 'github.com/nelsong6/fzt-terminal ' frontend/go.mod | awk '{print $2}')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/go.mod frontend/go.sum
          git commit -m "deps: update fzt ${FZT_VER}, fzt-terminal ${TERM_VER}"
          git push
